<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
  // 强制路径标准化：保留查询参数
  if (window.location.pathname === '/admin' && window.location.search) {
    // 保留所有查询参数，添加结尾斜杠
    const newUrl = window.location.origin + '/admin/' + window.location.search;
    window.history.replaceState({}, '', newUrl);
  }
  </script>

  <title>Content Manager</title>
  <!-- 加载 Decap CMS 核心文件 -->
  <script src="https://unpkg.com/decap-cms@latest/dist/decap-cms.js"></script>
</head>

</body>
</html>
